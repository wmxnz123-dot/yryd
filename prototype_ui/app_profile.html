<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人专属数据空间App - 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }

</head>
<body>

            </div>

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-800 flex items-center">
                <i class="fa-solid fa-user-tag text-blue-500 mr-2"></i>个人画像
            </h3>
            <a href="app_ai_chat.html" class="text-xs bg-gradient-to-r from-blue-500 to-indigo-500 text-white px-3 py-1.5 rounded-full shadow-sm flex items-center hover:opacity-90 transition">

        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative flex justify-center items-center h-48 overflow-hidden">
            <!-- Background Decoration -->

            <div class="absolute w-48 h-48 border border-blue-50 rounded-full"></div>
            
            <!-- Avatar/Image -->

            </div>

            <!-- Surrounding Tags -->
            <span class="floating-tag absolute top-4 left-4 bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded-full border border-blue-100 shadow-sm" style="animation-delay: 0s;">中共党员</span>
            <span class="floating-tag absolute top-8 right-4 bg-orange-50 text-orange-600 text-xs px-2 py-1 rounded-full border border-orange-100 shadow-sm" style="animation-delay: 0.5s;">有车一族</span>
            <span class="floating-tag absolute bottom-8 left-6 bg-green-50 text-green-600 text-xs px-2 py-1 rounded-full border border-green-100 shadow-sm" style="animation-delay: 1s;">健康达人</span>
            <span class="floating-tag absolute bottom-6 right-6 bg-purple-50 text-purple-600 text-xs px-2 py-1 rounded-full border border-purple-100 shadow-sm" style="animation-delay: 1.5s;">高新人才</span>
            <span class="floating-tag absolute top-20 left-2 bg-pink-50 text-pink-600 text-xs px-2 py-1 rounded-full border border-pink-100 shadow-sm" style="animation-delay: 0.2s;">信用极好</span>
        </div>
    </div>

    <!-- Bottom Section: Data Dashboard -->
    <div class="px-4 mt-6 mb-8">
        <h3 class="font-bold text-gray-800 mb-4 flex items-center">
            <i class="fa-solid fa-chart-pie text-blue-500 mr-2"></i>数据仪表盘
        </h3>
        
        <!-- Category 1: 五险一金 -->

            <div class="bg-gray-50 px-4 py-2 border-b border-gray-100 flex items-center">
                <div class="w-1 h-4 bg-blue-500 rounded-full mr-2"></div>

                <div class="flex justify-between items-center">

                    </div>
                    <a href="app_item_detail.html" class="px-3 py-1 bg-white border border-gray-200 text-gray-600 text-xs rounded-full hover:bg-gray-50">查看</a>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex items-center">

                    </div>
                    <a href="app_upload_detail.html" class="px-3 py-1 bg-white border border-gray-200 text-gray-600 text-xs rounded-full hover:bg-gray-50">查看</a>

        <!-- Category 3: 医疗健康 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 overflow-hidden">
            <div class="bg-gray-50 px-4 py-2 border-b border-gray-100 flex items-center">
                <div class="w-1 h-4 bg-green-500 rounded-full mr-2"></div>

            <div class="p-4 space-y-4">

                        <span class="text-sm text-gray-800">基础生理信息</span>
                    </div>
                    <a href="app_item_detail.html" class="px-3 py-1 bg-white border border-gray-200 text-gray-600 text-xs rounded-full hover:bg-gray-50">查看</a>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex items-center">
                        <i class="fa-solid fa-hospital text-green-400 w-5 mr-2"></i>
                        <span class="text-sm text-gray-800">门诊/住院记录</span>
                    </div>
                    <a href="app_item_detail.html" class="px-3 py-1 bg-white border border-gray-200 text-gray-600 text-xs rounded-full hover:bg-gray-50">查看</a>
                </div>
                <div class="flex justify-between items-center">

                        <i class="fa-solid fa-qrcode text-green-400 w-5 mr-2"></i>

        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="fixed bottom-0 left-0 w-full flex justify-center z-50 pointer-events-none">
        <div class="w-full max-w-[390px] bg-white border-t border-gray-200 flex justify-around py-2 pointer-events-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <a href="app_home.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="app_profile.html" class="flex flex-col items-center text-blue-600 w-1/2 border-l border-gray-100">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>
</div>

<!-- JavaScript for Data Masking Toggle -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggleEye');
        const eyeIcon = document.getElementById('eyeIcon');
        
        const nameEl = document.getElementById('displayName');
        const idCardEl = document.getElementById('displayIdCard');
        const addressEl = document.getElementById('displayAddress');
        const avatarEl = document.getElementById('displayAvatar');

        // Original vs Masked Data
        const data = {
            masked: {
                name: '张*',
                idCard: '370781********1234',
                address: '山东省潍坊市***',
                avatar: '张'
            },
            unmasked: {
                name: '张三',
                idCard: '370781199001011234',
                address: '山东省潍坊市高新区阳光社区1号楼2单元301室',
                avatar: '张' // Avatar usually stays the same, but just in case
            }
        };

        let isMasked = true;

        toggleBtn.addEventListener('click', function() {
            isMasked = !isMasked;
            
            if (isMasked) {
                // Switch to Masked
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
                
                nameEl.textContent = data.masked.name;
                idCardEl.textContent = data.masked.idCard;
                addressEl.textContent = data.masked.address;
            } else {
                // Switch to Unmasked
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
                
                nameEl.textContent = data.unmasked.name;
                idCardEl.textContent = data.unmasked.idCard;
                addressEl.textContent = data.unmasked.address;
            }
        });
    });
</script>
</body>
</html>
