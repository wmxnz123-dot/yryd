<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纠错记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_my_data.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">纠错记录</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
      <div class="mt-3 bg-gray-100 rounded-xl p-1 flex text-xs">
        <a href="./app_correction_list.html" class="flex-1 text-center py-2 rounded-lg bg-white shadow-sm font-semibold text-gray-900">进行中</a>
        <a href="./app_correction_list.html" class="flex-1 text-center py-2 rounded-lg text-gray-600">已完成</a>
        <a href="./app_correction_list.html" class="flex-1 text-center py-2 rounded-lg text-gray-600">全部</a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <a href="./app_correction_detail.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">基础身份数据 / 婚姻状态</div>
            <div class="text-xs text-gray-500 mt-1">原值：未婚 → 修正：已婚</div>
            <div class="text-xs text-gray-500 mt-1">提交：2025-10-24 10:12</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-600 border border-blue-100 h-fit">待审核</span>
        </div>
        <div class="mt-3 text-xs text-gray-500 bg-gray-50 border border-gray-100 rounded-lg px-3 py-2">
          预计 1-3 个工作日完成审核。
        </div>
      </a>

      <a href="./app_correction_detail.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">户籍信息 / 联系电话</div>
            <div class="text-xs text-gray-500 mt-1">原值：138****0000 → 修正：13911112222</div>
            <div class="text-xs text-gray-500 mt-1">提交：2025-10-20 16:40</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-100 h-fit">需补充</span>
        </div>
        <div class="mt-3 text-xs text-gray-500 bg-gray-50 border border-gray-100 rounded-lg px-3 py-2">
          请补充有效证明材料后继续处理。
        </div>
      </a>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">快速入口</div>
        <div class="mt-3 grid grid-cols-2 gap-3">
          <a href="./app_correction_submit.html" class="text-center text-sm font-semibold text-orange-700 bg-orange-50 border border-orange-100 rounded-xl py-3">提交纠错</a>
          <a href="./app_claim_catalog.html" class="text-center text-sm font-semibold text-blue-700 bg-blue-50 border border-blue-100 rounded-xl py-3">去认领核对</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
