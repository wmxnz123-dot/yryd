<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增数据服务 - 一人一档后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">
  <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
        <i class="fa-solid fa-cubes text-blue-500 text-2xl mr-3"></i>
        <span class="text-lg font-bold tracking-wider">一人一档后台</span>
    </div>
    <div class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1" id="sidebar-menu">
            <!-- 工作台 -->
            <li>
                <a href="admin_workbench.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-desktop w-6"></i> <span class="ml-3">智能工作台</span>
                </a>
            </li>
            <!-- 数据检索管理 -->
            <li>
                <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer" onclick="toggleMenu(this)">
                    <div class="flex items-center">
                        <i class="fa-solid fa-magnifying-glass w-6"></i> <span class="ml-3">数据检索管理</span>
                    </div>
                    <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                </div>
                <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">

                    <li><a href="admin_dashboard.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数据检索</a></li>
                    <li><a href="admin_dashboard_results.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">组合检索</a></li>
                    <li><a href="admin_tag_search.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">标签检索</a></li>
                    <li><a href="admin_data_map.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数图分析</a></li>
                </ul>
            </li>
            <!-- 认领数据管理 -->
            <li>
                <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer" onclick="toggleMenu(this)">
                    <div class="flex items-center">
                        <i class="fa-solid fa-hand-holding-hand w-6"></i> <span class="ml-3">认领数据管理</span>
                    </div>
                    <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                </div>
                <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                    <li><a href="admin_catalog_config.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">目录管理</a></li>
                    <li><a href="admin_corrections.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数据纠错处置</a></li>
                </ul>
            </li>
            <!-- 自有数据管理 -->
            <li>
                <a href="admin_own_data_catalog.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-folder-open w-6"></i> <span class="ml-3">自有数据管理</span>
                </a>
            </li>
            <!-- 授权管理 -->
            <li>
                <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer" onclick="toggleMenu(this)">
                    <div class="flex items-center">
                        <i class="fa-solid fa-shield-halved w-6"></i> <span class="ml-3">授权管理</span>
                    </div>
                    <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                </div>
                <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                    <li><a href="admin_auth_templates.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">规则配置</a></li>
                    <li><a href="admin_auth_monitor.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">异常监控</a></li>
                    <li><a href="admin_auth_blockchain.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">可信存证服务</a></li>
                    <li><a href="admin_auth_records.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">授权记录</a></li>
                </ul>
            </li>
            <!-- 数据服务管理 -->
            <li>
                <a href="admin_services_config.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-layer-group w-6"></i> <span class="ml-3">数据服务管理</span>
                </a>
            </li>
            <!-- 仪表盘配置 -->
                <li>
                    <a href="admin_profile_dashboard_config.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-chart-pie w-6"></i> <span class="ml-3">仪表盘配置</span>
                    </a>
                </li>
            <!-- 监管统计 (Hidden) -->
                <li class="hidden">
                    <a href="admin_monitor_stats.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-chart-line w-6"></i> <span class="ml-3">监管统计</span>
                </a>
            </li>
        </ul>
    </div>
</aside>

  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10 shrink-0">
      <div class="flex items-center text-gray-500">
          <i class="fa-solid fa-arrow-left cursor-pointer hover:text-gray-800 mr-4" onclick="history.back()"></i>
          <span class="text-sm">数据服务管理 <span class="mx-2">/</span> <a href="admin_services_config.html" class="hover:text-blue-600">配置数据服务</a> <span class="mx-2">/</span> <span class="text-gray-800 font-medium">新增数据服务</span></span>
      </div>
  </header>

    <main class="flex-1 overflow-y-auto p-6 bg-gray-50">
      <div class="mx-auto space-y-6 pb-24">
        
        <!-- 基础信息配置 -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
            <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">基础信息配置</h3>
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">服务名称 <span class="text-red-500">*</span></label>
                    <input type="text" placeholder="例如：办件秒批" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">被授权方类型 <span class="text-red-500">*</span></label>
                    <select class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 bg-white">
                        <option value="">请选择被授权方类型</option>
                        <option value="org">机构</option>
                        <option value="dept">部门</option>
                        <option value="corp">企业</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">被授权方类型图标 <span class="text-gray-400 font-normal text-xs ml-2">(建议尺寸 100x100，支持 png/jpg/svg)</span></label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-blue-500 hover:bg-blue-50 transition cursor-pointer group">
                        <div class="space-y-1 text-center">
                            <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 group-hover:text-blue-500 transition mb-2"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <span class="relative cursor-pointer rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                                    <span>点击上传</span>
                                    <input id="file-upload" name="file-upload" type="file" class="sr-only">
                                </span>
                                <p class="pl-1">或拖拽文件至此</p>
                            </div>
                            <p class="text-xs text-gray-500">PNG, JPG, GIF up to 2MB</p>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">有效期策略 <span class="text-red-500">*</span></label>
                    <select class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 bg-white">
                        <option value="">请选择有效期策略</option>
                        <option value="7">固定 7 天</option>
                        <option value="30">固定 30 天</option>
                        <option value="custom">可选区间</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 授权内容配置 -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
            <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">授权内容与说明</h3>
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">授权数据选择 <span class="text-red-500">*</span></label>
                    <div class="border border-gray-300 rounded-lg p-4 space-y-3">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded text-blue-500">
                            <span class="text-sm text-gray-700">基础身份信息</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded text-blue-500">
                            <span class="text-sm text-gray-700">社保信息</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded text-blue-500">
                            <span class="text-sm text-gray-700">医疗健康数据（摘要）</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="rounded text-blue-500">
                            <span class="text-sm text-gray-700">房产登记信息</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用途说明 <span class="text-red-500">*</span></label>
                    <input type="text" placeholder="例如：仅用于本次贷款额度测算，不得用于其他用途。" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">风险提示</label>
                    <textarea rows="3" placeholder="例如：授权范围遵循最小必要原则，您可随时撤销授权。" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 resize-none"></textarea>
                </div>
            </div>
        </div>

      </div>
    </main>

    <!-- Bottom Fixed Actions -->
    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 flex justify-end space-x-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
        <button class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition" onclick="history.back()">取消</button>
        <button class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-sm hover:bg-blue-700 transition" onclick="alert('授权配置保存成功！'); window.location.href='admin_auth_templates.html'">保存配置</button>
    </div>
  </div>

  
<script src="admin_sidebar_logic.js"></script>
</body>
</html>
