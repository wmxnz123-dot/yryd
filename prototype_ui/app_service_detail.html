<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服务详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 100px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    .bg-gradient { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-gradient text-white p-5 rounded-b-3xl shadow-md">
      <div class="flex items-center justify-between">
        <a href="app_services.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold">办件秒批</div>
        <a href="./index.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
      <div class="mt-4 bg-white bg-opacity-15 border border-white border-opacity-20 rounded-2xl p-4">
        <div class="text-sm opacity-90">服务简介</div>
        <div class="mt-2 text-xs opacity-90 leading-relaxed">
          通过授权调用个人数据，自动填充表单并校验材料，减少重复提交，提高办事效率。
        </div>
      </div>
    </div>

    <div class="px-4 mt-5 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">所需数据范围</div>
        <div class="mt-3 space-y-2">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-sm font-semibold text-gray-900">基础身份信息</div>
            <div class="mt-1 text-xs text-gray-500">姓名、证件信息（摘要）</div>
          </div>
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-sm font-semibold text-gray-900">社保公积金</div>
            <div class="mt-1 text-xs text-gray-500">参保状态、缴费信息（摘要）</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">授权提示</div>
        <div class="mt-2 text-xs text-gray-500 leading-relaxed">
          若您尚未对本服务所属机构授权，将在进入前发起授权请求。授权可随时撤销。
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <div class="flex gap-2">
          <a href="./app_auth_confirm.html" class="flex-1 text-center text-sm font-semibold text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-xl py-3">先授权</a>
          <a href="./app_services.html" class="flex-1 text-center text-sm font-semibold text-white bg-indigo-600 rounded-xl py-3">进入服务</a>
        </div>
        <div class="mt-2 text-[11px] text-gray-500 text-center">原型阶段：进入服务仅做跳转展示</div>
      </div>
    </div>
  </div>
</body>
</html>
