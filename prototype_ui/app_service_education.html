<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育信息授权 - 个人专属数据空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* Custom Checkbox Styles */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 2px solid #cbd5e1;
            border-radius: 0.25em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: transform;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked {
            background-color: #2563eb;
            border-color: #2563eb;
        }
        .custom-checkbox:checked::before {
            transform: scale(1);
        }
    </style>
</head>
<body>
<div class="mobile-view">
    <!-- Topbar -->
    <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100 sticky top-0 z-50">
        <a href="app_home.html" class="text-gray-600 w-8 h-8 flex items-center justify-center -ml-2">
            <i class="fa-solid fa-angle-left text-xl"></i>
        </a>
        <h1 class="text-lg font-bold text-gray-800">教育信息授权</h1>
        <div class="w-8"></div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-4 pb-24">
        <!-- Banner -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl p-5 text-white shadow-md mb-5 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-lg font-bold mb-1">主动授权码</h2>
                <p class="text-xs text-blue-100 opacity-90 leading-relaxed">
                    选择下方您需要授权的教育数据目录，生成专属授权码。可用于政务办事、求职入职、资质审核等场景。
                </p>
            </div>
            <i class="fa-solid fa-graduation-cap absolute -right-2 -bottom-4 text-6xl text-white/10"></i>
        </div>

        <div class="flex justify-between items-end mb-3 px-1">
            <h3 class="font-bold text-gray-800 text-sm">选择授权数据目录</h3>
            <span class="text-xs text-blue-600" id="selectedCount">已选: 0 项</span>
        </div>

        <!-- Data Catalog List -->
        <div class="space-y-3" id="dataList">
            <!-- Item 1 -->
            <label class="flex items-center p-4 bg-white rounded-xl border border-gray-200 shadow-sm cursor-pointer hover:bg-blue-50/50 transition relative overflow-hidden">
                <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 mr-3 flex-shrink-0">
                    <i class="fa-regular fa-id-card text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm mb-1">个人身份基础信息</h4>
                    <p class="text-xs text-gray-500">姓名、性别、身份证号、民族</p>
                </div>
                <div class="ml-3">
                    <input type="checkbox" class="custom-checkbox data-checkbox" value="身份信息" onchange="updateSelection()">
                </div>
            </label>

            <!-- Item 2 -->
            <label class="flex items-center p-4 bg-white rounded-xl border border-gray-200 shadow-sm cursor-pointer hover:bg-blue-50/50 transition">
                <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 mr-3 flex-shrink-0">
                    <i class="fa-solid fa-user-graduate text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm mb-1">学历信息（学信网）</h4>
                    <p class="text-xs text-gray-500">毕业院校、专业、学历层次、毕业时间</p>
                </div>
                <div class="ml-3">
                    <input type="checkbox" class="custom-checkbox data-checkbox" value="学历信息" onchange="updateSelection()">
                </div>
            </label>

            <!-- Item 3 -->
            <label class="flex items-center p-4 bg-white rounded-xl border border-gray-200 shadow-sm cursor-pointer hover:bg-blue-50/50 transition">
                <div class="w-10 h-10 bg-purple-50 rounded-full flex items-center justify-center text-purple-500 mr-3 flex-shrink-0">
                    <i class="fa-solid fa-scroll text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm mb-1">学位信息</h4>
                    <p class="text-xs text-gray-500">学位授予单位、学位类别、证书编号</p>
                </div>
                <div class="ml-3">
                    <input type="checkbox" class="custom-checkbox data-checkbox" value="学位信息" onchange="updateSelection()">
                </div>
            </label>

            <!-- Item 4 -->
            <label class="flex items-center p-4 bg-white rounded-xl border border-gray-200 shadow-sm cursor-pointer hover:bg-blue-50/50 transition">
                <div class="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center text-green-500 mr-3 flex-shrink-0">
                    <i class="fa-solid fa-award text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm mb-1">职业技能培训证书</h4>
                    <p class="text-xs text-gray-500">培训机构、工种名称、技能等级</p>
                </div>
                <div class="ml-3">
                    <input type="checkbox" class="custom-checkbox data-checkbox" value="培训证书" onchange="updateSelection()">
                </div>
            </label>
            
            <!-- Item 5 -->
            <label class="flex items-center p-4 bg-white rounded-xl border border-gray-200 shadow-sm cursor-pointer hover:bg-blue-50/50 transition">
                <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center text-orange-500 mr-3 flex-shrink-0">
                    <i class="fa-solid fa-language text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm mb-1">外语等级考试成绩</h4>
                    <p class="text-xs text-gray-500">四六级成绩、考试时间 (自有数据)</p>
                </div>
                <div class="ml-3">
                    <input type="checkbox" class="custom-checkbox data-checkbox" value="外语成绩" onchange="updateSelection()">
                </div>
            </label>
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 w-full max-w-[390px] bg-white border-t border-gray-100 p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-40">
        <div class="flex items-center justify-between mb-3 px-1">
            <div class="text-xs text-gray-500 flex items-center">
                <input type="checkbox" id="selectAll" class="mr-2 custom-checkbox" style="width: 1em; height: 1em;" onchange="toggleSelectAll()"> 全选
            </div>
            <div class="text-xs text-gray-400">授权码单次有效，5分钟后过期</div>
        </div>
        <button id="generateBtn" class="w-full bg-gray-300 text-white font-bold py-3.5 rounded-xl transition shadow-sm cursor-not-allowed" onclick="generateQRCode()" disabled>
            生成动态授权码
        </button>
    </div>

    <!-- QR Code Modal (Hidden by default) -->
    <div id="qrModal" class="hidden fixed inset-0 z-[60] bg-black/60 flex flex-col items-center justify-center p-5 backdrop-blur-sm">
        <div class="bg-white w-full max-w-[320px] rounded-2xl overflow-hidden shadow-2xl relative">
            <!-- Modal Header -->
            <div class="bg-blue-600 p-4 text-center relative">
                <button onclick="closeQRModal()" class="absolute right-4 top-4 text-white/80 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                <h3 class="text-white font-bold text-lg">出示授权码</h3>
                <p class="text-blue-100 text-xs mt-1">请向业务办理人员或扫码设备出示</p>
            </div>
            
            <!-- Modal Body -->
            <div class="p-6 flex flex-col items-center">
                <!-- QR Code Container -->
                <div class="bg-white p-2 rounded-xl shadow-inner border border-gray-100 mb-4 relative">
                    <div id="qrcode" class="w-48 h-48 flex items-center justify-center"></div>
                    <!-- Refresh Overlay (hidden initially) -->
                    <div id="qrOverlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center rounded-xl cursor-pointer" onclick="refreshQR()">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 mb-2 shadow-sm">
                            <i class="fa-solid fa-rotate-right text-lg"></i>
                        </div>
                        <span class="text-sm font-medium text-gray-600">二维码已失效，点击刷新</span>
                    </div>
                </div>
                
                <!-- Countdown -->
                <div class="text-center mb-5">
                    <p class="text-2xl font-mono font-bold text-blue-600 tracking-wider" id="countdown">04:59</p>
                    <p class="text-[10px] text-gray-400 mt-1">请在倒计时结束前完成扫码</p>
                </div>

                <!-- Selected Data Summary -->
                <div class="w-full bg-gray-50 rounded-lg p-3 border border-gray-100">
                    <div class="text-xs font-bold text-gray-700 mb-2 flex items-center">
                        <i class="fa-solid fa-shield-halved text-blue-500 mr-1.5"></i> 包含以下授权数据：
                    </div>
                    <div id="modalDataList" class="flex flex-wrap gap-1.5">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="bg-gray-50 p-4 border-t border-gray-100 flex justify-center">
                <button onclick="closeQRModal()" class="px-6 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition shadow-sm">完成</button>
            </div>
        </div>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.data-checkbox');
    const selectAllCheckbox = document.getElementById('selectAll');
    const generateBtn = document.getElementById('generateBtn');
    const selectedCountText = document.getElementById('selectedCount');
    let timerInterval;

    function updateSelection() {
        let checkedCount = 0;
        checkboxes.forEach(cb => {
            if(cb.checked) checkedCount++;
            
            // Highlight parent label
            const label = cb.closest('label');
            if(cb.checked) {
                label.classList.add('border-blue-300', 'bg-blue-50/30');
            } else {
                label.classList.remove('border-blue-300', 'bg-blue-50/30');
            }
        });
        
        selectedCountText.innerText = `已选: ${checkedCount} 项`;
        
        // Update Select All state
        selectAllCheckbox.checked = (checkedCount === checkboxes.length);
        
        // Enable/Disable Generate Button
        if (checkedCount > 0) {
            generateBtn.disabled = false;
            generateBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
            generateBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
        } else {
            generateBtn.disabled = true;
            generateBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
            generateBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        }
    }

    function toggleSelectAll() {
        const isChecked = selectAllCheckbox.checked;
        checkboxes.forEach(cb => {
            cb.checked = isChecked;
        });
        updateSelection();
    }

    function generateQRCode() {
        // Collect selected items
        const selectedItems = [];
        checkboxes.forEach(cb => {
            if(cb.checked) selectedItems.push(cb.value);
        });

        // Populate modal data list
        const modalList = document.getElementById('modalDataList');
        modalList.innerHTML = '';
        selectedItems.forEach(item => {
            const span = document.createElement('span');
            span.className = 'text-[10px] bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded-md';
            span.innerText = item;
            modalList.appendChild(span);
        });

        // Show Modal
        document.getElementById('qrModal').classList.remove('hidden');
        
        // Generate QR Code (Clear old one first)
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), {
            text: "auth_token_" + Date.now(),
            width: 180,
            height: 180,
            colorDark : "#1e3a8a", // blue-900
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Hide overlay and start timer
        document.getElementById('qrOverlay').classList.add('hidden');
        startTimer(5 * 60); // 5 minutes
    }

    function closeQRModal() {
        document.getElementById('qrModal').classList.add('hidden');
        clearInterval(timerInterval);
    }

    function refreshQR() {
        generateQRCode();
    }

    function startTimer(duration) {
        clearInterval(timerInterval);
        let timer = duration, minutes, seconds;
        const display = document.getElementById('countdown');
        
        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            display.textContent = minutes + ":" + seconds;

            if (--timer < 0) {
                clearInterval(timerInterval);
                document.getElementById('qrOverlay').classList.remove('hidden');
                display.textContent = "00:00";
            }
        }, 1000);
    }
</script>
</body>
</html>
