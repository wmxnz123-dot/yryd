<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增认领目录 - 一人一档后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
            <i class="fa-solid fa-cubes text-blue-500 text-2xl mr-3"></i>
            <span class="text-lg font-bold tracking-wider">一人一档后台</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1" id="sidebar-menu">
                <!-- 仅保留认领数据管理展开作为示例 -->
                <li>
                    <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer">
                        <div class="flex items-center">
                            <i class="fa-solid fa-hand-holding-hand w-6"></i> <span class="ml-3">认领数据管理</span>
                        </div>
                        <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                    </div>
                    <ul class="pl-14 py-2 space-y-3 text-sm bg-gray-800/50">
                        <li><a href="admin_catalog_config.html" class="text-white relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:bg-blue-500 before:rounded-full font-medium">目录管理</a></li>
                        <li><a href="admin_corrections.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数据纠错处置</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Topbar -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center text-gray-500">
                <i class="fa-solid fa-arrow-left cursor-pointer hover:text-gray-800 mr-4" onclick="history.back()"></i>
                <span class="text-sm">认领数据管理 <span class="mx-2">/</span> <a href="admin_catalog_config.html" class="hover:text-blue-600">目录管理</a> <span class="mx-2">/</span> <span class="text-gray-800 font-medium">新增目录</span></span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6 bg-gray-50">
            <div class="mx-auto space-y-6 pb-24">
                
                <!-- 基础信息配置 -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
                    <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">基础信息配置</h3>
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">目录名称 <span class="text-red-500">*</span></label>
                            <input type="text" placeholder="请输入目录名称" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                    </div>
                </div>

                <!-- 数据源及表配置 -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
                    <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">数据源配置</h3>
                    <div class="grid grid-cols-2 gap-6 items-end">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择数据源 <span class="text-red-500">*</span></label>
                            <select id="dataSourceSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500" onchange="checkSourceSelection()">
                                <option value="">请选择数据源系统</option>
                                <option value="police">公安系统 (Police_DB)</option>
                                <option value="medical">卫健委系统 (Health_DB)</option>
                                <option value="civil">民政系统 (Civil_DB)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择数据表 <span class="text-red-500">*</span></label>
                            <select id="dataTableSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 disabled:bg-gray-100 disabled:cursor-not-allowed" disabled onchange="fetchTableFields()">
                                <option value="">请先选择数据源</option>
                                <!-- Options will be populated via JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 信息项配置 (动态拉取) -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6 hidden" id="fieldsConfigSection">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-base font-bold text-gray-800 border-l-4 border-blue-500 pl-2">信息项配置 (已拉取)</h3>
                        <span class="text-xs bg-green-50 text-green-600 px-2 py-1 rounded border border-green-100"><i class="fa-solid fa-check-circle mr-1"></i>成功拉取字段</span>
                    </div>
                    
                    <div class="overflow-x-auto border border-gray-200 rounded-lg">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
                                    <th class="p-3 font-medium w-10 text-center"><input type="checkbox" class="rounded" checked id="selectAllFields"></th>
                                    <th class="p-3 font-medium">源字段名</th>
                                    <th class="p-3 font-medium">字段类型</th>
                                    <th class="p-3 font-medium">展示名称(可修改)</th>
                                    <th class="p-3 font-medium text-center">可认领</th>
                                    <th class="p-3 font-medium text-center">可授权</th>
                                    <th class="p-3 font-medium text-center">可纠错</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm" id="fieldsTableBody">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>

        <!-- Bottom Fixed Actions -->
        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 flex justify-end space-x-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
            <button class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition" onclick="alert('已暂存至草稿箱')">暂存</button>
            <button class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-sm hover:bg-blue-700 transition" onclick="publishCatalog()">发布目录</button>
        </div>
    </div>

<script>
    // 模拟数据源联动逻辑
    const mockTables = {
        'police': [
            { id: 't_base_info', name: '人口基础信息表 (t_base_info)' },
            { id: 't_address', name: '户籍地址表 (t_address)' }
        ],
        'medical': [
            { id: 't_outpatient', name: '门诊就诊记录表 (t_outpatient)' }
        ]
    };

    const mockFields = {
        't_base_info': [
            { field: 'id_card', type: 'VARCHAR(18)', name: '身份证号' },
            { field: 'real_name', type: 'VARCHAR(50)', name: '姓名' },
            { field: 'gender', type: 'INT', name: '性别' },
            { field: 'nation', type: 'VARCHAR(20)', name: '民族' }
        ],
        't_outpatient': [
            { field: 'hospital_name', type: 'VARCHAR(100)', name: '就诊医院' },
            { field: 'visit_date', type: 'DATETIME', name: '就诊时间' },
            { field: 'department', type: 'VARCHAR(50)', name: '就诊科室' },
            { field: 'diagnosis', type: 'TEXT', name: '诊断结果' }
        ]
    };

    function checkSourceSelection() {
        const source = document.getElementById('dataSourceSelect').value;
        const tableSelect = document.getElementById('dataTableSelect');
        const fieldsSection = document.getElementById('fieldsConfigSection');
        
        // 重置状态
        fieldsSection.classList.add('hidden');
        tableSelect.innerHTML = '<option value="">请选择数据表</option>';
        
        if (source && mockTables[source]) {
            tableSelect.disabled = false;
            mockTables[source].forEach(t => {
                const option = document.createElement('option');
                option.value = t.id;
                option.innerText = t.name;
                tableSelect.appendChild(option);
            });
        } else {
            tableSelect.disabled = true;
            tableSelect.innerHTML = '<option value="">请先选择数据源</option>';
        }
    }

    function fetchTableFields() {
        const tableId = document.getElementById('dataTableSelect').value;
        const fieldsSection = document.getElementById('fieldsConfigSection');
        const tbody = document.getElementById('fieldsTableBody');
        
        if (tableId && mockFields[tableId]) {
            tbody.innerHTML = ''; // 清空
            
            // 模拟加载延迟
            setTimeout(() => {
                mockFields[tableId].forEach((f, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-100 hover:bg-gray-50";
                    tr.innerHTML = `
                        <td class="p-3 text-center"><input type="checkbox" class="rounded" checked></td>
                        <td class="p-3 font-mono text-gray-600">${f.field}</td>
                        <td class="p-3 font-mono text-gray-400 text-xs">${f.type}</td>
                        <td class="p-3"><input type="text" value="${f.name}" class="border border-gray-300 rounded px-2 py-1 text-sm w-full focus:border-blue-500 focus:outline-none"></td>
                        <td class="p-3 text-center"><input type="checkbox" checked class="text-blue-600"></td>
                        <td class="p-3 text-center"><input type="checkbox" checked class="text-blue-600"></td>
                        <td class="p-3 text-center"><input type="checkbox" ${index > 1 ? '' : 'checked'} class="text-blue-600"></td>
                    `;
                    tbody.appendChild(tr);
                });
                fieldsSection.classList.remove('hidden');
            }, 500); // 500ms 模拟请求
        } else {
            fieldsSection.classList.add('hidden');
        }
    }

    function publishCatalog() {
        alert('目录发布成功！状态已更新为“已发布”。');
        window.location.href = 'admin_catalog_config.html';
    }
</script>
</body>
</html>
