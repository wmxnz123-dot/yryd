<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管家 - 个人数据空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    .bg-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-gradient text-white p-5 rounded-b-3xl shadow-md">
      <div class="flex items-center justify-between">
        <a href="./app_home.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-grid-2"></i>
        </a>
        <div class="text-base font-semibold">数据管家</div>
        <a href="./app_home.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-house"></i>
        </a>
      </div>
      <div class="mt-5 bg-white bg-opacity-15 rounded-2xl p-4 border border-white border-opacity-20">
        <div class="text-sm opacity-90">数据处理中心</div>
        <div class="mt-2 text-xs opacity-80">认领平台数据、管理自有资料、提交纠错与跟踪处理。</div>
        <div class="mt-3 flex gap-2">
          <a href="./app_claim_catalog.html" class="flex-1 text-center text-sm font-medium bg-white text-blue-700 rounded-xl py-2">去认领</a>
          <a href="./app_upload_form.html" class="flex-1 text-center text-sm font-medium bg-white bg-opacity-20 rounded-xl py-2 border border-white border-opacity-30">去上传</a>
        </div>
      </div>
    </div>

    <div class="px-4 mt-5">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-center justify-between">
          <div class="font-bold text-gray-800">平台数据认领</div>
          <a href="./app_claim_catalog.html" class="text-xs text-blue-600">进入 <i class="fa-solid fa-angle-right ml-1"></i></a>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-3 text-center">
          <div class="rounded-xl bg-blue-50 border border-blue-100 p-3">
            <div class="text-lg font-bold text-blue-600">3</div>
            <div class="text-[11px] text-gray-600 mt-1">待认领</div>
          </div>
          <div class="rounded-xl bg-emerald-50 border border-emerald-100 p-3">
            <div class="text-lg font-bold text-emerald-600">15</div>
            <div class="text-[11px] text-gray-600 mt-1">已认领</div>
          </div>
          <div class="rounded-xl bg-orange-50 border border-orange-100 p-3">
            <div class="text-lg font-bold text-orange-600">1</div>
            <div class="text-[11px] text-gray-600 mt-1">纠错中</div>
          </div>
        </div>
      </div>
    </div>

    <div class="px-4 mt-4">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-center justify-between">
          <div class="font-bold text-gray-800">自有数据管理</div>
          <a href="./app_upload_list.html" class="text-xs text-blue-600">查看 <i class="fa-solid fa-angle-right ml-1"></i></a>
        </div>
        <div class="mt-3 flex items-center justify-between rounded-xl bg-gray-50 border border-gray-100 p-3">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center">
              <i class="fa-solid fa-file-arrow-up"></i>
            </div>
            <div>
              <div class="text-sm font-semibold text-gray-800">上传资料</div>
              <div class="text-xs text-gray-500 mt-1">按模板上传证明材料与补充信息</div>
            </div>
          </div>
          <a href="./app_upload_form.html" class="text-sm font-semibold text-green-600">上传</a>
        </div>
      </div>
    </div>

    <div class="px-4 mt-4">
      <div class="grid grid-cols-2 gap-3">
        <a href="./app_correction_list.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center">
              <i class="fa-solid fa-pen-to-square"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">纠错记录</div>
              <div class="text-xs text-gray-500 mt-1">跟踪处理进度</div>
            </div>
          </div>
        </a>
        <a href="./app_auth_requests.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center">
              <i class="fa-solid fa-shield"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">授权请求</div>
              <div class="text-xs text-gray-500 mt-1">待处理 1 条</div>
            </div>
          </div>
        </a>
        <a href="./app_auth_records.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center">
              <i class="fa-solid fa-key"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">授权记录</div>
              <div class="text-xs text-gray-500 mt-1">可撤销、可追溯</div>
            </div>
          </div>
        </a>
        <a href="./app_services.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center">
              <i class="fa-solid fa-layer-group"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">数据服务</div>
              <div class="text-xs text-gray-500 mt-1">一键进入应用</div>
            </div>
          </div>
        </a>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="fixed bottom-0 left-0 w-full flex justify-center z-50 pointer-events-none">
        <div class="w-full max-w-[390px] bg-white border-t border-gray-200 flex justify-around py-2 pointer-events-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <a href="app_home.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="app_profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2 border-l border-gray-100">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>
  </div>
</body>
</html>
