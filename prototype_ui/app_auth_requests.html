<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权请求</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_home.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">授权请求</div>
        <a href="./app_auth_records.html" class="text-sm font-semibold text-blue-600">记录</a>
      </div>
      <div class="mt-3 bg-gray-100 rounded-xl p-1 flex text-xs">
        <a href="./app_auth_requests.html" class="flex-1 text-center py-2 rounded-lg bg-white shadow-sm font-semibold text-gray-900">待处理</a>
        <a href="./app_auth_requests.html" class="flex-1 text-center py-2 rounded-lg text-gray-600">已处理</a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <a href="./app_auth_confirm.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">市公积金中心</div>
            <div class="text-xs text-gray-500 mt-1">用途：公积金贷款额度测算</div>
            <div class="text-xs text-gray-500 mt-1">范围：身份信息、社保信息（摘要）</div>
            <div class="text-xs text-gray-500 mt-1">有效期：7 天</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-purple-50 text-purple-600 border border-purple-100 h-fit">待处理</span>
        </div>
        <div class="mt-3 flex gap-2">
          <button class="flex-1 text-center text-sm font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-xl py-2">拒绝</button>
          <span class="flex-1 text-center text-sm font-semibold text-purple-700 bg-purple-50 border border-purple-100 rounded-xl py-2">去确认</span>
        </div>
      </a>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">授权原则</div>
        <div class="mt-2 text-xs text-gray-500 leading-relaxed">
          授权前请确认“被授权方、用途、范围、有效期”。授权范围遵循最小必要原则，您可在授权记录中随时撤销。
        </div>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="fixed bottom-0 left-0 w-full flex justify-center z-50 pointer-events-none">
        <div class="w-full max-w-[390px] bg-white border-t border-gray-200 flex justify-around py-2 pointer-events-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <a href="app_home.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="app_profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2 border-l border-gray-100">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>
  </div>
</body>
</html>
