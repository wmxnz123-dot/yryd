<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 个人专属数据空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="mobile-view">
    <!-- Top Nav -->
    <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100 sticky top-0 z-50">
        <a href="app_profile.html" class="text-gray-600 w-8 h-8 flex items-center justify-center -ml-2">
            <i class="fa-solid fa-angle-left text-xl"></i>
        </a>
        <h1 class="text-lg font-bold text-gray-800 absolute left-1/2 -translate-x-1/2">设置</h1>
        <div class="w-8"></div>
    </div>

    <!-- Settings List -->
    <div class="px-4 py-4 space-y-4">
        <!-- Group 1 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <a href="#" class="flex items-center justify-between p-4 hover:bg-gray-50 transition border-b border-gray-50">
                <div class="flex items-center text-gray-700">
                    <i class="fa-solid fa-file-contract w-6 text-center text-blue-500 mr-2"></i>
                    <span class="text-sm font-medium">用户服务信息</span>
                </div>
                <i class="fa-solid fa-angle-right text-gray-400 text-sm"></i>
            </a>
            <a href="app_ai_chat.html" class="flex items-center justify-between p-4 hover:bg-gray-50 transition border-b border-gray-50">
                <div class="flex items-center text-gray-700">
                    <i class="fa-regular fa-circle-question w-6 text-center text-orange-500 mr-2"></i>
                    <span class="text-sm font-medium">使用说明 <span class="bg-gradient-to-r from-blue-100 to-indigo-100 text-blue-600 text-[10px] px-1.5 py-0.5 rounded ml-2"><i class="fa-solid fa-robot mr-1"></i>AI 客服答疑</span></span>
                </div>
                <i class="fa-solid fa-angle-right text-gray-400 text-sm"></i>
            </a>
            <a href="app_correction_list.html" class="flex items-center justify-between p-4 hover:bg-gray-50 transition">
                <div class="flex items-center text-gray-700">
                    <i class="fa-solid fa-clock-rotate-left w-6 text-center text-green-500 mr-2"></i>
                    <span class="text-sm font-medium">纠错历史</span>
                </div>
                <i class="fa-solid fa-angle-right text-gray-400 text-sm"></i>
            </a>
        </div>

        <!-- Group 2 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <a href="#" class="flex items-center justify-between p-4 hover:bg-gray-50 transition border-b border-gray-50">
                <div class="flex items-center text-gray-700">
                    <i class="fa-solid fa-shield-halved w-6 text-center text-purple-500 mr-2"></i>
                    <span class="text-sm font-medium">隐私政策</span>
                </div>
                <i class="fa-solid fa-angle-right text-gray-400 text-sm"></i>
            </a>
            <a href="#" class="flex items-center justify-between p-4 hover:bg-gray-50 transition">
                <div class="flex items-center text-gray-700">
                    <i class="fa-solid fa-circle-info w-6 text-center text-gray-500 mr-2"></i>
                    <span class="text-sm font-medium">关于我们</span>
                </div>
                <div class="flex items-center text-gray-400 text-sm">
                    <span class="mr-2 text-xs">v1.0.0</span>
                    <i class="fa-solid fa-angle-right"></i>
                </div>
            </a>
        </div>

        <!-- Logout Button -->
         <a href="app_splash.html">
            <button class="w-full mt-6 bg-white border border-gray-200 text-red-500 font-medium py-3.5 rounded-xl shadow-sm hover:bg-red-50 transition">
                退出登录
            </button>
        </a>
    </div>
</div>
</body>
</html>
