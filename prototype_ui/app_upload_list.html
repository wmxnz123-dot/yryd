<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自有数据-列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_home.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900 absolute left-1/2 -translate-x-1/2">自有数据</div>
        <div class="w-9 h-9"></div>
      </div>
      <div class="mt-3 flex items-center gap-3">
        <div class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 flex items-center gap-2">
          <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
          <input class="bg-transparent text-sm outline-none w-full" placeholder="检索目录名称">
        </div>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-5">
      <!-- 身份资料分类 -->
      <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
        <div class="flex items-center mb-3 px-1">
          <div class="text-sm font-bold text-gray-900" id="group-name-1">身份资料</div>
          <div class="flex gap-2 ml-3">
            <button class="text-gray-400 hover:text-blue-500 transition" onclick="showEditModal('group-name-1')"><i class="fa-solid fa-pen-to-square text-xs"></i></button>
            <button class="text-gray-400 hover:text-red-500 transition" onclick="showDeleteModal('group-name-1')"><i class="fa-solid fa-trash-can text-xs"></i></button>
          </div>
        </div>
        <div class="space-y-3" id="group-list-1">
          <!-- 已上传 -->
          <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative group cursor-move" id="item-1" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)">
            <div class="flex items-center justify-between gap-3">
              <a href="./app_upload_detail.html" class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                  <i class="fa-solid fa-id-card"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">身份证复印件</div>
                  <div class="text-xs text-gray-500 mt-1">已上传 1 份数据</div>
                </div>
              </a>
              <div class="flex items-center gap-3">
                <a href="./app_upload_detail.html"><i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i></a>
              </div>
            </div>
          </div>
          <!-- 未上传 -->
          <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative group cursor-move" id="item-2" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)">
            <div class="flex items-center justify-between gap-3">
              <a href="./app_upload_form.html" class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center">
                  <i class="fa-solid fa-passport"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">护照信息</div>
                  <div class="text-xs text-gray-400 mt-1">暂未上传</div>
                </div>
              </a>
              <div class="flex items-center gap-3">
                <a href="./app_upload_form.html" class="text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg font-medium">去上传</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 证明材料分类 -->
      <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
        <div class="flex items-center mb-3 px-1">
          <div class="text-sm font-bold text-gray-900" id="group-name-2">证明材料</div>
          <div class="flex gap-2 ml-3">
            <button class="text-gray-400 hover:text-blue-500 transition" onclick="showEditModal('group-name-2')"><i class="fa-solid fa-pen-to-square text-xs"></i></button>
            <button class="text-gray-400 hover:text-red-500 transition" onclick="showDeleteModal('group-name-2')"><i class="fa-solid fa-trash-can text-xs"></i></button>
          </div>
        </div>
        <div class="space-y-3" id="group-list-2">
          <!-- 已上传 -->
          <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative group cursor-move" id="item-3" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)">
            <div class="flex items-center justify-between gap-3">
              <a href="./app_upload_detail.html" class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">
                  <i class="fa-solid fa-file-lines"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">手机号变更证明</div>
                  <div class="text-xs text-gray-500 mt-1">已上传 2 份数据</div>
                </div>
              </a>
              <div class="flex items-center gap-3">
                <a href="./app_upload_detail.html"><i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i></a>
              </div>
            </div>
          </div>
          <!-- 未上传 -->
          <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative group cursor-move" id="item-4" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)">
            <div class="flex items-center justify-between gap-3">
              <a href="./app_upload_form.html" class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center">
                  <i class="fa-solid fa-building"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">工作证明</div>
                  <div class="text-xs text-gray-400 mt-1">暂未上传</div>
                </div>
              </a>
              <div class="flex items-center gap-3">
                <a href="./app_upload_form.html" class="text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg font-medium">去上传</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 健康信息分类 -->
      <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
        <div class="flex items-center mb-3 px-1">
          <div class="text-sm font-bold text-gray-900" id="group-name-3">健康信息</div>
          <div class="flex gap-2 ml-3">
            <button class="text-gray-400 hover:text-blue-500 transition" onclick="showEditModal('group-name-3')"><i class="fa-solid fa-pen-to-square text-xs"></i></button>
            <button class="text-gray-400 hover:text-red-500 transition" onclick="showDeleteModal('group-name-3')"><i class="fa-solid fa-trash-can text-xs"></i></button>
          </div>
        </div>
        <div class="space-y-3" id="group-list-3">
          <!-- 未上传 -->
          <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative group cursor-move" id="item-5" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)">
            <div class="flex items-center justify-between gap-3">
              <a href="./app_upload_form.html" class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center">
                  <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <div>
                  <div class="text-sm font-bold text-gray-900">体检报告</div>
                  <div class="text-xs text-gray-400 mt-1">暂未上传</div>
                </div>
              </a>
              <div class="flex items-center gap-3">
                <a href="./app_upload_form.html" class="text-xs text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg font-medium">去上传</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑分类名称弹窗 -->
  <div id="editGroupModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
      <div class="bg-white rounded-2xl p-6 w-5/6 max-w-sm mx-auto shadow-xl">
          <h3 class="text-lg font-bold text-gray-800 mb-4 text-center">修改分类名称</h3>
          <input type="text" id="editGroupNameInput" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 mb-6" placeholder="请输入新的分类名称">
          <div class="flex space-x-3">
              <button onclick="closeEditModal()" class="flex-1 bg-gray-100 text-gray-600 font-medium py-3 rounded-xl hover:bg-gray-200 transition">
                  取消
              </button>
              <button onclick="confirmEditGroup()" class="flex-1 bg-blue-600 text-white font-medium py-3 rounded-xl hover:bg-blue-700 transition">
                  确定
              </button>
          </div>
      </div>
  </div>

  <!-- 删除分类确认弹窗 -->
  <div id="deleteGroupModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
      <div class="bg-white rounded-2xl p-6 w-5/6 max-w-sm mx-auto shadow-xl text-center">
          <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
              <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500"></i>
          </div>
          <h3 class="text-lg font-bold text-gray-800 mb-2">确认删除该分类？</h3>
          <p class="text-sm text-gray-600 mb-6">删除后，该分类下的数据将被移至默认分组。</p>
          <div class="flex space-x-3">
              <button onclick="closeDeleteModal()" class="flex-1 bg-gray-100 text-gray-600 font-medium py-3 rounded-xl hover:bg-gray-200 transition">
                  取消
              </button>
              <button onclick="confirmDeleteGroup()" class="flex-1 bg-red-500 text-white font-medium py-3 rounded-xl hover:bg-red-600 transition">
                  删除
              </button>
          </div>
      </div>
  </div>

  <!-- 模拟交互逻辑脚本 -->
  <script>
    let currentEditGroupId = null;
    let currentDeleteGroupId = null;

    // 显示编辑弹窗
    function showEditModal(groupId) {
        currentEditGroupId = groupId;
        const groupEl = document.getElementById(groupId);
        document.getElementById('editGroupNameInput').value = groupEl.innerText;
        document.getElementById('editGroupModal').classList.remove('hidden');
    }

    // 关闭编辑弹窗
    function closeEditModal() {
        document.getElementById('editGroupModal').classList.add('hidden');
        currentEditGroupId = null;
    }

    // 确认编辑
    function confirmEditGroup() {
        const newName = document.getElementById('editGroupNameInput').value.trim();
        if (newName && currentEditGroupId) {
            document.getElementById(currentEditGroupId).innerText = newName;
            closeEditModal();
        } else {
            alert('分类名称不能为空');
        }
    }

    // 显示删除弹窗
    function showDeleteModal(groupId) {
        currentDeleteGroupId = groupId;
        document.getElementById('deleteGroupModal').classList.remove('hidden');
    }

    // 关闭删除弹窗
    function closeDeleteModal() {
        document.getElementById('deleteGroupModal').classList.add('hidden');
        currentDeleteGroupId = null;
    }

    // 确认删除
    function confirmDeleteGroup() {
        if (currentDeleteGroupId) {
            const groupEl = document.getElementById(currentDeleteGroupId);
            // 简单模拟删除效果：隐藏整个分组容器
            groupEl.closest('.drop-zone').style.display = 'none';
            closeDeleteModal();
        }
    }

    // 移动数据项 (旧方法，保留兼容或后续可移除)
    function moveItem(itemId) {
      const itemEl = document.getElementById(itemId);
      const targetGroup = prompt('请输入目标分组名称（例如：身份资料、证明材料、健康信息）：');
      
      if (targetGroup) {
        // 这里仅做简单的交互演示提示，实际需操作 DOM 节点转移
        alert(`数据目录已成功移动到 "${targetGroup}" 分组下！`);
      }
    }

    // --- 拖拽交互逻辑 ---
    let draggedItem = null;

    function drag(event) {
      draggedItem = event.target.closest('.group');
      event.dataTransfer.effectAllowed = 'move';
      // 设置透明度反馈
      setTimeout(() => {
        draggedItem.style.opacity = '0.5';
      }, 0);
    }

    function dragEnd(event) {
      if (draggedItem) {
        draggedItem.style.opacity = '1';
        draggedItem = null;
      }
      // 清除所有 drop-zone 的高亮样式
      document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.classList.remove('bg-blue-50', 'border', 'border-blue-200', 'border-dashed', 'rounded-xl');
      });
    }

    function allowDrop(event) {
      event.preventDefault(); // 允许放置
    }

    function dragEnter(event) {
      event.preventDefault();
      const dropZone = event.currentTarget;
      if (dropZone.classList.contains('drop-zone')) {
        dropZone.classList.add('bg-blue-50', 'border', 'border-blue-200', 'border-dashed', 'rounded-xl', 'transition-colors');
      }
    }

    function dragLeave(event) {
      const dropZone = event.currentTarget;
      // 防止子元素触发 dragleave 导致闪烁
      if (!dropZone.contains(event.relatedTarget)) {
        dropZone.classList.remove('bg-blue-50', 'border', 'border-blue-200', 'border-dashed', 'rounded-xl');
      }
    }

    function drop(event) {
      event.preventDefault();
      const dropZone = event.currentTarget;
      
      // 恢复样式
      dropZone.classList.remove('bg-blue-50', 'border', 'border-blue-200', 'border-dashed', 'rounded-xl');

      if (draggedItem) {
        // 找到目标分组的列表容器
        const groupList = dropZone.querySelector('[id^="group-list-"]');
        
        // 确保没有拖回原来的地方
        if (groupList && draggedItem.parentElement !== groupList) {
          groupList.appendChild(draggedItem);
          
          // 获取目标分组名称用于提示
          const groupNameEl = dropZone.querySelector('[id^="group-name-"]');
          const groupName = groupNameEl ? groupNameEl.innerText : '新分组';
          
          // alert(`已成功移动到 "${groupName}" 分组！`);
        }
      }
    }
  </script>
</body>
</html>
