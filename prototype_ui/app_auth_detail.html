<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人专属数据空间App - 授权详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="mobile-view">
    <!-- Topbar -->
    <div class="bg-white px-4 py-3 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <a href="app_my_auth.html?tab=authorized" class="text-gray-600"><i class="fa-solid fa-angle-left text-xl"></i></a>
        <h1 class="text-lg font-bold text-gray-800 absolute left-1/2 -translate-x-1/2">授权详情</h1>
        <div class="w-6"></div> <!-- Placeholder -->
    </div>

    <!-- Content -->
    <div class="p-4 space-y-4">
        <!-- Status Card -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 text-center">
            <div id="statusIcon" class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-3">
                <!-- Icon injected by JS -->
            </div>
            <h2 id="statusTitle" class="text-xl font-bold text-gray-800 mb-1">加载中...</h2>
            <p id="statusDesc" class="text-xs text-gray-500">正在获取授权状态信息</p>
        </div>

        <!-- Auth Info Card -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-4 border-b border-gray-50 pb-2">基础信息</h3>
            <div class="space-y-3 text-sm">
                <div class="flex">
                    <span class="text-gray-400 w-20 flex-shrink-0">被授权方</span>
                    <span class="text-gray-800 font-medium" id="authOrg">市公积金中心</span>
                </div>
                <div class="flex">
                    <span class="text-gray-400 w-20 flex-shrink-0">授权事项</span>
                    <span class="text-gray-800">公积金贷款额度测算</span>
                </div>
                <div class="flex">
                    <span class="text-gray-400 w-20 flex-shrink-0">数据目录</span>
                    <span class="text-gray-800">基础身份信息、社保信息</span>
                </div>
                <div class="flex">
                    <span class="text-gray-400 w-20 flex-shrink-0">授权时间</span>
                    <span class="text-gray-800" id="authTime">2025-10-01 10:20:00</span>
                </div>
                <div class="flex">
                    <span class="text-gray-400 w-20 flex-shrink-0">有效期限</span>
                    <span class="text-gray-800" id="authExpire">至 2026-10-01</span>
                </div>
            </div>
        </div>

        <!-- Action Area -->
        <div class="mt-6" id="actionArea">
            <a href="app_auth_records.html" class="w-full bg-purple-600 text-white font-medium py-3 rounded-xl shadow-sm hover:bg-purple-700 transition flex justify-center items-center mb-3">
                <i class="fa-solid fa-list-ul mr-2"></i> 查看使用记录
            </a>
            <div id="validActions" class="flex space-x-3 hidden">
                <button class="flex-1 bg-white border border-gray-200 text-gray-600 font-medium py-3 rounded-xl shadow-sm hover:bg-gray-50 transition" onclick="alert('进入调整授权时间流程')">
                    调整时间
                </button>
                <button class="flex-1 bg-white border border-red-200 text-red-500 font-medium py-3 rounded-xl shadow-sm hover:bg-red-50 transition" onclick="confirm('确认取消该授权吗？取消后服务方将无法继续获取相关数据。')">
                    取消授权
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status') || 'valid';

        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const validActions = document.getElementById('validActions');
        
        // Mock data based on status
        if (status === 'valid') {
            statusIcon.className = "w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-3 bg-green-50 text-green-500 text-3xl";
            statusIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
            statusTitle.innerText = "授权有效中";
            statusDesc.innerText = "被授权方可在有效期内使用该数据";
            validActions.classList.remove('hidden');
        } else if (status === 'used') {
            statusIcon.className = "w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-3 bg-blue-50 text-blue-500 text-3xl";
            statusIcon.innerHTML = '<i class="fa-solid fa-check-double"></i>';
            statusTitle.innerText = "已使用";
            statusDesc.innerText = "单次授权，数据已被成功调用";
            document.getElementById('authOrg').innerText = "市政务服务网";
            document.getElementById('authTime').innerText = "2025-09-15 09:30:00";
            document.getElementById('authExpire').innerText = "单次有效";
        } else if (status === 'expired') {
            statusIcon.className = "w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-3 bg-gray-100 text-gray-400 text-3xl";
            statusIcon.innerHTML = '<i class="fa-solid fa-clock"></i>';
            statusTitle.innerText = "授权已过期";
            statusDesc.innerText = "授权期限已过，被授权方已无法使用该数据";
            document.getElementById('authOrg').innerText = "市第一人民医院";
            document.getElementById('authTime').innerText = "2023-01-01 10:00:00";
            document.getElementById('authExpire').innerText = "至 2024-01-01 (已过期)";
        } else if (status === 'revoked') {
            statusIcon.className = "w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-3 bg-gray-100 text-gray-500 text-3xl";
            statusIcon.innerHTML = '<i class="fa-solid fa-ban"></i>';
            statusTitle.innerText = "授权已撤销";
            statusDesc.innerText = "您已主动撤销该授权";
            document.getElementById('authOrg').innerText = "某某银行";
            document.getElementById('authTime').innerText = "2025-05-01 14:00:00";
            document.getElementById('authExpire').innerText = "撤销时间：2025-06-01 09:00:00";
        }
    });
</script>
</body>
</html>
