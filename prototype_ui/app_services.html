<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据服务</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    .bg-gradient { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-gradient text-white p-5 rounded-b-3xl shadow-md">
      <div class="flex items-center justify-between">
        <a href="index.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-grid-2"></i>
        </a>
        <div class="text-base font-semibold">授权与服务</div>
        <a href="./app_auth_requests.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-bell"></i>
        </a>
      </div>
      <div class="mt-4 bg-white bg-opacity-15 border border-white border-opacity-20 rounded-2xl p-4">
        <div class="text-sm opacity-90">待处理授权</div>
        <div class="mt-2 flex items-center justify-between">
          <div class="text-2xl font-bold">1</div>
          <a href="./app_auth_requests.html" class="text-sm font-semibold bg-white text-indigo-700 rounded-xl px-4 py-2">去处理</a>
        </div>
        <div class="mt-2 text-xs opacity-80">授权可随时撤销，范围遵循最小必要。</div>
      </div>
    </div>

    <div class="px-4 mt-5">
      <div class="flex items-center justify-between">
        <div class="font-bold text-gray-900">数据服务</div>
        <a href="./app_services.html" class="text-xs text-indigo-600">全部 <i class="fa-solid fa-angle-right ml-1"></i></a>
      </div>
      <div class="mt-3 grid grid-cols-2 gap-3">
        <a href="./app_service_detail.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center">
            <i class="fa-solid fa-file-circle-check"></i>
          </div>
          <div class="mt-3 text-sm font-bold text-gray-900">办件秒批</div>
          <div class="mt-1 text-xs text-gray-500">数据免填表</div>
          <div class="mt-3 text-xs text-indigo-600 font-semibold">进入</div>
        </a>
        <a href="./app_service_detail.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center">
            <i class="fa-solid fa-scale-balanced"></i>
          </div>
          <div class="mt-3 text-sm font-bold text-gray-900">贷款测评</div>
          <div class="mt-1 text-xs text-gray-500">一键授权</div>
          <div class="mt-3 text-xs text-emerald-600 font-semibold">进入</div>
        </a>
        <a href="./app_service_detail.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="w-10 h-10 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center">
            <i class="fa-solid fa-hospital"></i>
          </div>
          <div class="mt-3 text-sm font-bold text-gray-900">电子病历共享</div>
          <div class="mt-1 text-xs text-gray-500">跨院调阅</div>
          <div class="mt-3 text-xs text-orange-600 font-semibold">进入</div>
        </a>
        <a href="./app_auth_records.html" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
            <i class="fa-solid fa-key"></i>
          </div>
          <div class="mt-3 text-sm font-bold text-gray-900">我的授权</div>
          <div class="mt-1 text-xs text-gray-500">可撤销可追溯</div>
          <div class="mt-3 text-xs text-purple-600 font-semibold">查看</div>
        </a>
      </div>
    </div>

    <div class="px-4 mt-5">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-center justify-between">
          <div class="font-bold text-gray-900">快捷入口</div>
          <a href="./app_auth_records.html" class="text-xs text-indigo-600">授权记录 <i class="fa-solid fa-angle-right ml-1"></i></a>
        </div>
        <div class="mt-3 grid grid-cols-2 gap-3">
          <a href="./app_auth_requests.html" class="text-center text-sm font-semibold text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-xl py-3">待处理请求</a>
          <a href="./app_claim_catalog.html" class="text-center text-sm font-semibold text-blue-700 bg-blue-50 border border-blue-100 rounded-xl py-3">去认领数据</a>
        </div>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="fixed bottom-0 left-0 w-full flex justify-center z-50 pointer-events-none">
        <div class="w-full max-w-[390px] bg-white border-t border-gray-200 flex justify-around py-2 pointer-events-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <a href="app_home.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="app_profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2 border-l border-gray-100">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>
  </div>
</body>
</html>
