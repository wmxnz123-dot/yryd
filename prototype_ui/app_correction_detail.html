<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纠错详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 92px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_correction_list.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">纠错详情</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-xs text-gray-500">工单号</div>
            <div class="text-sm font-bold text-gray-900 mt-1">CT-20251024-001</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-100 h-fit">需补充</span>
        </div>
        <div class="mt-3 grid grid-cols-2 gap-3">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">提交时间</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">2025-10-20 16:40</div>
          </div>
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">纠错对象</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">联系电话</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">纠错内容</div>
        <div class="mt-3 divide-y divide-gray-100">
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">目录/数据项</div>
            <div class="text-sm font-semibold text-gray-900 text-right">户籍信息 / 基础信息</div>
          </div>
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">系统原值</div>
            <div class="text-sm font-semibold text-gray-900 text-right">138****0000</div>
          </div>
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">修正值</div>
            <div class="text-sm font-semibold text-gray-900 text-right">13911112222</div>
          </div>
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">说明</div>
            <div class="text-sm font-semibold text-gray-900 text-right">号码已更换</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">材料与处理</div>
        <div class="mt-3">
          <div class="text-xs text-gray-500">已提交材料</div>
          <div class="mt-2 flex items-center justify-between bg-gray-50 border border-gray-100 rounded-xl px-3 py-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-600">
                <i class="fa-solid fa-image"></i>
              </div>
              <div>
                <div class="text-sm font-semibold text-gray-900">无</div>
                <div class="text-xs text-gray-500 mt-1">建议补充证明材料</div>
              </div>
            </div>
            <span class="text-xs text-gray-400">0 个</span>
          </div>
        </div>
        <div class="mt-3 text-xs text-orange-700 bg-orange-50 border border-orange-100 rounded-xl px-3 py-3 leading-relaxed">
          审核意见：请补充手机号码归属证明或运营商变更凭证（照片/截图均可）。
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <div class="flex gap-2">
          <a href="./app_upload_form.html" class="flex-1 text-center text-sm font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-xl py-3">去上传材料</a>
          <a href="./app_correction_submit.html" class="flex-1 text-center text-sm font-semibold text-orange-700 bg-orange-50 border border-orange-100 rounded-xl py-3">补充提交</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
