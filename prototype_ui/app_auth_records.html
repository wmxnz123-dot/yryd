<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权使用记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_my_auth.html?tab=authorized" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900 absolute left-1/2 -translate-x-1/2">授权使用记录</div>
        <div class="w-9 h-9"></div>
      </div>
      <div class="mt-3 flex gap-2 text-xs">
        <span class="px-2.5 py-1 rounded-full bg-purple-50 text-purple-700 border border-purple-100">全部</span>
        <span class="px-2.5 py-1 rounded-full bg-white text-gray-600 border border-gray-200">调用成功</span>
        <span class="px-2.5 py-1 rounded-full bg-white text-gray-600 border border-gray-200">调用失败</span>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white px-4 py-3 sticky top-[108px] z-10 shadow-sm border-b border-gray-100">
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" placeholder="搜索机构名称或授权事项" class="w-full bg-gray-100 text-sm rounded-full pl-9 pr-4 py-2 focus:outline-none focus:ring-1 focus:ring-purple-500 transition">
        </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">市公积金中心</div>
            <div class="text-xs text-gray-500 mt-1">授权事项：公积金贷款额度测算</div>
            <div class="text-xs text-gray-500 mt-1">调用时间：2025-10-25 10:05:22</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-green-50 text-green-600 border border-green-100 h-fit">调用成功</span>
        </div>
        <div class="mt-3 text-xs text-gray-500 bg-gray-50 border border-gray-100 rounded-xl px-3 py-2">
          调阅数据：基础身份信息、社保信息（摘要）
        </div>
      </div>

      <div class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">市政务服务网</div>
            <div class="text-xs text-gray-500 mt-1">授权事项：政务一网通办身份免填</div>
            <div class="text-xs text-gray-500 mt-1">调用时间：2025-10-20 14:30:00</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-green-50 text-green-600 border border-green-100 h-fit">调用成功</span>
        </div>
        <div class="mt-3 text-xs text-gray-500 bg-gray-50 border border-gray-100 rounded-xl px-3 py-2">
          调阅数据：基础身份信息
        </div>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="fixed bottom-0 left-0 w-full flex justify-center z-50 pointer-events-none">
        <div class="w-full max-w-[390px] bg-white border-t border-gray-200 flex justify-around py-2 pointer-events-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <a href="app_home.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="app_profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2 border-l border-gray-100">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>
  </div>
</body>
</html>
