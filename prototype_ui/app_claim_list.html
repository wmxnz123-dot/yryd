<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据认领-列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_my_data.html?tab=unclaimed" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">医疗健康数据</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
      <div class="mt-3 flex items-center gap-3">
        <div class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 flex items-center gap-2">
          <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
          <input class="bg-transparent text-sm outline-none w-full" placeholder="搜索数据项，例如：体检、门诊">
        </div>
        <button class="text-sm font-semibold text-blue-600">筛选</button>
      </div>
      <div class="mt-3 flex gap-2 text-xs">
        <span class="px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-100">未认领</span>
        <span class="px-2.5 py-1 rounded-full bg-white text-gray-600 border border-gray-200">已认领</span>
        <span class="px-2.5 py-1 rounded-full bg-white text-gray-600 border border-gray-200">异常</span>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">2023年度体检报告</div>
            <div class="text-xs text-gray-500 mt-1">来源：市健康体检中心</div>
            <div class="text-xs text-gray-500 mt-1">更新时间：2025-10-25 09:30</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-red-50 text-red-600 border border-red-100 h-fit">未认领</span>
        </div>
        <div class="mt-3 flex gap-2">
          <a href="./app_item_detail.html" class="flex-1 text-center text-sm font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-xl py-2">查看</a>
          <a href="./app_item_detail.html" class="flex-1 text-center text-sm font-semibold text-blue-700 bg-blue-50 border border-blue-100 rounded-xl py-2">立即认领</a>
        </div>
        <div class="mt-2">
          <a href="./app_correction_submit.html" class="text-xs text-orange-600 font-semibold">发现错误？去纠错 <i class="fa-solid fa-angle-right ml-1"></i></a>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-bold text-gray-900">门诊就诊记录（2025-09）</div>
            <div class="text-xs text-gray-500 mt-1">来源：市立医院</div>
            <div class="text-xs text-gray-500 mt-1">更新时间：2025-09-16 18:10</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-red-50 text-red-600 border border-red-100 h-fit">未认领</span>
        </div>
        <div class="mt-3 flex gap-2">
          <a href="./app_item_detail.html" class="flex-1 text-center text-sm font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-xl py-2">查看</a>
          <a href="./app_item_detail.html" class="flex-1 text-center text-sm font-semibold text-blue-700 bg-blue-50 border border-blue-100 rounded-xl py-2">立即认领</a>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-semibold text-gray-900">批量认领（V1 可选）</div>
        <div class="text-xs text-gray-500 mt-1">如需批量能力，可在原型评审通过后补充勾选与确认弹窗。</div>
        <div class="mt-3 flex gap-2">
          <button class="flex-1 text-center text-sm font-semibold text-gray-400 bg-gray-50 border border-gray-200 rounded-xl py-2" disabled>勾选后认领</button>
          <a href="./app_claim_catalog.html" class="flex-1 text-center text-sm font-semibold text-blue-600 bg-white border border-blue-200 rounded-xl py-2">返回目录</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
