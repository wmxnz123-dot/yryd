<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据认领-目录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    .bg-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-gradient text-white p-5 rounded-b-3xl shadow-md">
      <div class="flex items-center justify-between">
        <a href="app_my_data.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold">数据认领</div>
        <a href="./index.html" class="w-9 h-9 bg-white bg-opacity-15 rounded-full flex items-center justify-center">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
      <div class="mt-4">
        <div class="bg-white bg-opacity-15 border border-white border-opacity-20 rounded-2xl px-4 py-3 flex items-center gap-3">
          <i class="fa-solid fa-magnifying-glass opacity-90"></i>
          <input class="bg-transparent placeholder-white placeholder-opacity-70 text-sm w-full outline-none" placeholder="搜索数据目录，例如：公积金、社保、户籍">
        </div>
        <div class="mt-3 flex gap-2">
          <span class="text-xs px-2.5 py-1 rounded-full bg-white bg-opacity-15 border border-white border-opacity-20">待认领 3</span>
          <span class="text-xs px-2.5 py-1 rounded-full bg-white bg-opacity-15 border border-white border-opacity-20">已认领 15</span>
          <span class="text-xs px-2.5 py-1 rounded-full bg-white bg-opacity-15 border border-white border-opacity-20">异常 0</span>
        </div>
      </div>
    </div>

    <div class="px-4 mt-5 space-y-3">
      <a href="./app_claim_list.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
              <i class="fa-solid fa-id-card"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">基础身份数据</div>
              <div class="text-xs text-gray-500 mt-1">户籍、婚姻、证照等</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-xs text-red-500 font-semibold">待认领 1</div>
            <div class="text-[11px] text-gray-400 mt-1">2/3 已认领</div>
          </div>
        </div>
      </a>

      <a href="./app_claim_list.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center">
              <i class="fa-solid fa-notes-medical"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">医疗健康数据</div>
              <div class="text-xs text-gray-500 mt-1">体检报告、就诊记录等</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-xs text-red-500 font-semibold">待认领 2</div>
            <div class="text-[11px] text-gray-400 mt-1">0/2 已认领</div>
          </div>
        </div>
      </a>

      <a href="./app_claim_list.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center">
              <i class="fa-solid fa-coins"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">社保公积金</div>
              <div class="text-xs text-gray-500 mt-1">缴费、账户余额、明细</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-xs text-gray-600 font-semibold">无待认领</div>
            <div class="text-[11px] text-gray-400 mt-1">5/5 已认领</div>
          </div>
        </div>
      </a>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-500 flex items-center justify-center">
              <i class="fa-solid fa-building-columns"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-800">教育与培训</div>
              <div class="text-xs text-gray-500 mt-1">学籍、学历、资格证书</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-xs text-gray-500 font-semibold">暂未开放</div>
            <div class="text-[11px] text-gray-400 mt-1">敬请期待</div>
          </div>
        </div>
        <div class="mt-3 text-xs text-gray-500 bg-gray-50 border border-gray-100 rounded-lg px-3 py-2">
          该目录待后台配置开放后可认领。
        </div>
      </div>
    </div>

    <div class="px-4 mt-5">
      <a href="./app_correction_list.html" class="block text-center text-sm font-semibold text-blue-600 bg-white rounded-xl border border-gray-100 shadow-sm py-3">
        查看纠错记录
      </a>
    </div>
  </div>
</body>
</html>
