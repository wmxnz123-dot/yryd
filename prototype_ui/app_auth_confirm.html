<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授权确认</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 100px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_auth_requests.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">授权确认</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-start justify-between">
          <div>
            <div class="text-sm font-bold text-gray-900">市公积金中心</div>
            <div class="text-xs text-gray-500 mt-1">用途：公积金贷款额度测算</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full bg-purple-50 text-purple-600 border border-purple-100 h-fit">待确认</span>
        </div>
        <div class="mt-3 grid grid-cols-2 gap-3">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">有效期</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">7 天</div>
          </div>
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">授权方式</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">最小必要</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-center justify-between">
          <div class="text-sm font-bold text-gray-900">授权范围</div>
          <span class="text-xs text-gray-400">可展开查看</span>
        </div>
        <div class="mt-3 space-y-2">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="flex items-center justify-between">
              <div class="text-sm font-semibold text-gray-900">基础身份信息</div>
              <i class="fa-solid fa-angle-down text-gray-400"></i>
            </div>
            <div class="mt-2 text-xs text-gray-500">姓名、证件类型、证件号（摘要展示）</div>
          </div>
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="flex items-center justify-between">
              <div class="text-sm font-semibold text-gray-900">社保信息</div>
              <i class="fa-solid fa-angle-down text-gray-400"></i>
            </div>
            <div class="mt-2 text-xs text-gray-500">参保状态、缴费月数（摘要展示）</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">风险提示</div>
        <div class="mt-2 text-xs text-gray-500 leading-relaxed">
          您授权的范围仅用于本次场景。授权期间您可随时撤销授权；撤销后对方将无法继续调用您的数据。请勿向非可信机构授权。
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <div class="flex gap-2">
          <a href="./app_auth_requests.html" class="flex-1 text-center text-sm font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-xl py-3">拒绝</a>
          <a href="./app_auth_records.html" class="flex-1 text-center text-sm font-semibold text-white bg-purple-600 rounded-xl py-3">确认授权</a>
        </div>
        <div class="mt-2 text-[11px] text-gray-500 text-center">授权后可在授权记录中撤销</div>
      </div>
    </div>
  </div>
</body>
</html>
