<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交纠错</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 92px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_item_detail.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">提交纠错</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">纠错对象</div>
        <div class="mt-3 grid gap-3">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">目录</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">基础身份数据</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">纠错内容</div>
        <div class="mt-4">
          <label class="text-xs text-gray-500">详细描述问题</label>
          <textarea class="mt-2 w-full bg-white border border-gray-300 rounded-xl px-3 py-3 text-sm outline-none focus:border-blue-500" rows="3" placeholder="详细说明，不少于10个字符"></textarea>
        </div>
        <div class="mt-4">
          <label class="text-xs text-gray-500">纠错原因（可选）</label>
          <select class="mt-2 w-full bg-white border border-gray-300 rounded-xl px-3 py-3 text-sm outline-none focus:border-blue-500 text-gray-700">
            <option>请选择原因</option>
            <option>系统数据错误</option>
            <option>数据已变更</option>
            <option>其他</option>
          </select>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative">
        <div class="flex items-center justify-between">
          <div class="text-sm font-bold text-gray-900">证明材料</div>
          <span class="text-xs text-gray-400">支持图片/文件</span>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-3">
          <!-- Upload Button -->
          <div class="aspect-square rounded-xl bg-gray-50 border border-gray-200 flex flex-col items-center justify-center text-gray-500 cursor-pointer hover:bg-gray-100 transition" onclick="simulateUpload()">
            <i class="fa-solid fa-plus text-lg"></i>
            <div class="text-[10px] mt-2">添加</div>
          </div>
          <!-- Image Placeholder (Hidden by default) -->
          <div id="uploadedImage" class="hidden aspect-square rounded-xl border border-gray-200 relative overflow-hidden">
              <img src="https://via.placeholder.com/150?text=结婚证" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                  <i class="fa-solid fa-check text-white text-xl"></i>
              </div>
          </div>
          <div class="aspect-square rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-400">
            <div class="text-xs">空位</div>
          </div>
        </div>
        
        <!-- AI Checking State (Hidden by default) -->
        <div id="aiChecking" class="hidden mt-4 p-3 bg-blue-50 rounded-lg flex items-start">
            <i class="fa-solid fa-robot text-blue-500 mt-0.5 mr-2 animate-pulse"></i>
            <div class="text-xs text-blue-700">AI 正在智能识别材料内容...</div>
        </div>

        <!-- AI Result State (Hidden by default) -->
        <div id="aiResult" class="hidden mt-4 p-3 bg-green-50 rounded-lg flex items-start border border-green-100">
            <i class="fa-solid fa-circle-check text-green-500 mt-0.5 mr-2"></i>
            <div>
                <div class="text-xs font-bold text-green-800 mb-1">AI 预审通过</div>
                <div class="text-[10px] text-green-700">识别到材料类型为【结婚证】，包含持证人【张三】，与纠错诉求相符。这能大大加快后台审核速度！</div>
            </div>
        </div>

        <div class="mt-3 text-xs text-gray-500 leading-relaxed">
          建议上传能够证明修正信息的材料，以提升审核效率。
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <a href="./app_correction_list.html" class="block text-center text-sm font-semibold text-white bg-orange-500 rounded-xl py-3">提交纠错申请</a>
        <div class="mt-2 text-[11px] text-gray-500 text-center">提交后可在纠错记录中查看进度</div>
      </div>
    </div>
  </div>

  <script>
      function simulateUpload() {
          const img = document.getElementById('uploadedImage');
          const checking = document.getElementById('aiChecking');
          const result = document.getElementById('aiResult');

          // Show image and loading state
          img.classList.remove('hidden');
          checking.classList.remove('hidden');
          result.classList.add('hidden');

          // Simulate AI processing delay
          setTimeout(() => {
              checking.classList.add('hidden');
              result.classList.remove('hidden');
          }, 2000);
      }
  </script>
</body>
</html>
